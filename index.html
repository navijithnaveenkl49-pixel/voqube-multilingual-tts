<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamer TTS - Indian Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="main-wrapper">
        <div class="cyber-container">
            <h1 class="glitch-header" data-text="VOICE_GEN_PROTOCOL">VOICE_GEN_PROTOCOL</h1>

            <div class="input-section">
                <textarea id="text-input" placeholder=">> ENTER TEXT STREAM HERE..."></textarea>
                <div class="char-count">0 / 5000</div>
            </div>

            <div class="controls-grid">
                <div class="control-group">
                    <label>VOICE PROTOCOL <i class="fas fa-microchip"></i></label>
                    <select id="voice-select"></select>
                </div>

                <div class="sliders-group">
                    <div class="slider-box">
                        <label>RATE <span id="rate-value">1</span></label>
                        <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
                    </div>
                    <div class="slider-box">
                        <label>PITCH <span id="pitch-value">1</span></label>
                        <input type="range" id="pitch" min="0" max="2" value="1" step="0.1">
                    </div>
                </div>
            </div>

            <div class="action-dock">
                <button id="speak-btn" class="cyber-btn primary">
                    <span class="btn-content"><i class="fas fa-play"></i> INITIATE</span>
                    <span class="glitch-effect"></span>
                </button>
                <button id="stop-btn" class="cyber-btn danger">
                    <span class="btn-content"><i class="fas fa-stop"></i> ABORT</span>
                </button>
            </div>

            <div class="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
